<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>よしきとじゃんけん</title>
<style>
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #f3efe8;
    color: #333;
  }

  .game {
    max-width: 680px;
    margin: 24px auto;
    padding: 18px;
  }

  .card {
    background: #fffaf4;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  }

  h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 18px;
  }

  .screen {
    background: #ffffff;
    border-radius: 16px;
    padding: 20px;
    min-height: 210px;
    border: 2px solid #e6d8c8;
  }

  .speaker {
    font-weight: bold;
    color: #6b4f3f;
    margin-bottom: 10px;
  }

  .dialogue {
    font-size: 19px;
    line-height: 1.8;
    white-space: pre-line;
  }

  .hands {
    text-align: center;
    margin-top: 22px;
  }

  button {
    font-size: 18px;
    padding: 13px 22px;
    margin: 6px;
    border: none;
    border-radius: 14px;
    background: #7aa6c8;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #5d91bb;
  }

  .status {
    margin-top: 18px;
    font-size: 14px;
    color: #666;
    line-height: 1.7;
    text-align: center;
  }

  .hint {
    color: #b76b35;
    font-weight: bold;
  }
</style>
</head>

<body>
<div class="game">
  <div class="card">
    <h1>よしきとじゃんけん</h1>

    <div class="screen">
      <div class="speaker" id="speaker">佳紀</div>
      <div class="dialogue" id="dialogue">じゃんけん、するん？</div>
    </div>

    <div class="hands">
      <button onclick="play('グー')">グー</button>
      <button onclick="play('チョキ')">チョキ</button>
      <button onclick="play('パー')">パー</button>
    </div>

    <div class="status" id="status">
      勝ち：0　負け：0　あいこ：0<br>
      連勝：0　連敗：0　遊んだ回数：0
    </div>
  </div>
</div>

<script>
let wins = 0;
let losses = 0;
let draws = 0;
let rounds = 0;

let winStreak = 0;
let loseStreak = 0;
let drawStreak = 0;

let lastYoshikiHand = null;
let lastYoshikiResult = null;

let hikariHint = null;
let hikaruSupportHand = null;

let hikariJoined = false;
let hikaruJoined = false;
let kissEventDone = false;

let hint30Done = false;
let hint50Done = false;
let hint70Done = false;

const hands = ["グー", "チョキ", "パー"];

function play(playerHand) {
  rounds++;

  let yoshikiHand = decideYoshikiHand();
  let result = judge(playerHand, yoshikiHand);

  let speaker = "佳紀";
  let line = "";

  if (result === "win") {
    wins++;
    winStreak++;
    loseStreak = 0;
    drawStreak = 0;
    lastYoshikiResult = "lose";

    line = random([
      "あー……負けた。\nもう一回。",
      "なんでそんな強いん。",
      "負けとる……。",
      "納得いかん、もう一回や。",
      "んー、ダメやったか。",
      "……もう一回やろ。",
      "……次は負けやん。"
    ]);
  }

  if (result === "lose") {
    losses++;
    loseStreak++;
    winStreak = 0;
    drawStreak = 0;
    lastYoshikiResult = "win";

    line = random([
      "勝ちや。",
      "あ……勝てた。",
      "俺の勝ちやな。",
      "なんか今日、調子ええかも。",
      "……もう一回する？",
      "……次も勝てるかな。"
    ]);
  }

  if (result === "draw") {
    draws++;
    drawStreak++;
    winStreak = 0;
    loseStreak = 0;
    lastYoshikiResult = "draw";

    line = random([
      "……あいこや。",
      "同じやったな。",
      "気ぃ合うな。",
      "もう一回やろ。"
    ]);
  }

  if (hikariHint !== null) {
    if (hikariHint === yoshikiHand) {
      speaker = "光";
      line = `ほらな。よしき、次は${hikariHint}出すと思ったわ。\n\n佳紀「ええ…何で分かったん？」`;
    } else {
      speaker = "光";
      line = `ごめんな。外した。\n\n佳紀「何で光が謝るん。」`;
    }
    hikariHint = null;
  }

  if (hikaruSupportHand !== null) {
    if (result === "win") {
      speaker = "ヒカル";
      line = random([
        `なんでや！！\nおれが応援したのに！！\n\n佳紀「……ごめん。」`,
        `あかんかったかぁ……。\nでもよしき、次はいけるで。\n\n佳紀「次は負けやん。」`,
        `今のは惜しかったなぁ。\n\n佳紀「せやな。次は勝てるかも」`
      ]);
    } else if (result === "lose") {
      speaker = "ヒカル";
      line = random([
        `よしきの勝ちや！\nえらいで、かわええなぁ。\n\n佳紀「なんで上から目線なん。」`,
        `ほら、よしき勝てたやろ？\n\n佳紀「うん、ヒカルのおかげや」`,
        `よしき、ちゃんと勝ったなぁ。\nかわええ。\n\n佳紀「わっ、そんなくっつかんといて。」`
      ]);
    } else {
      speaker = "ヒカル";
      line = random([
        `あいこかぁ。\nでもよしき、がんばっとるで。\n\n佳紀「はいはい、ありがとな。」`,
        `引き分けやなぁ。\n次は勝てるで、よしき。\n\n佳紀「……うん。」`,
        `よしき、次や次。\n\n佳紀「分かっとる。」`
      ]);
    }
    hikaruSupportHand = null;
  }

  if (loseStreak >= 3 && hikariHint === null) {
    hikariJoined = true;
    speaker = "光";
    hikariHint = predictYoshikiHand();
    line = `お前、よしきに負けすぎやん。\nしゃーない。今回だけ教えたる。\n\n<span class="hint">ヒント：よしきは次に「${hikariHint}」を出しそうだ。</span>`;
  }

  if (winStreak >= 3 && winStreak < 7 && hikaruSupportHand === null) {
    hikaruJoined = true;
    speaker = "ヒカル";
    hikaruSupportHand = random(hands);
    line = random([
      `よしきばっか負けとる……。\n\n（ヒカルが佳紀に何か耳打ちした。）\n\nヒカル「次は頑張ってな！」`,
      `よしき、ちょっとこっち来て。\n\n（ヒカルが佳紀にこそこそ耳打ちした。）\n\nヒカル「大丈夫やで。次は勝てる！」`,
      `おれはよしきの味方やからな。\n\n（ヒカルが佳紀に何か耳打ちした。）\n\n佳紀「……分かった。」`,
      `よしき、負けすぎやん。\n\n（ヒカルが佳紀に何か耳打ちした。）\n\nヒカル「次はよしきが勝つ！」`
    ]);
  }

  if (drawStreak >= 3) {
    speaker = "佳紀";
    line = `……なんでこんなに何度も合うん。\n\nヒカル「仲良しやなぁ。」\n光「いや、張り合っとるだけやろ。」`;
  }

  if (rounds === 10) {
    speaker = "佳紀";
    line = "……もう十回もやっとるけど。\n疲れとらん？\n……俺はまだええよ。";
  }

  if (rounds === 20) {
    speaker = "佳紀";
    line = "まだやるん？\n……ええけど。\nお前とやるんは、嫌やないし。";
  }

  if (rounds >= 30 && !hint30Done && !kissEventDone) {
    hint30Done = true;
    speaker = "光";
    line =
`お前も気づいたやろ。

よしき、負けると意地になって
同じ手ぇ出しがちなんよ。分かりやす〜

佳紀「黙っててくれへんかなぁ！」`;
  }

  if (rounds >= 50 && !hint50Done && !kissEventDone) {
    hint50Done = true;
    speaker = "ヒカル";
    line =
`よしき、
勝ったあと、同じ手はあんまり出さんよな。

嬉しくなると、ちょっと変えたくなるんや。

佳紀「今それ言わんでええやろ。」`;
  }

  if (rounds >= 70 && !hint70Done && !kissEventDone) {
    hint70Done = true;
    speaker = "光";
    line =
`光「あと、あいこの後な？」

ヒカル「よしき、なんかチョキ多いんよなぁ。」

佳紀「……うっ」

光「これでお前も、よしきマスターやな！」

佳紀「そんなもんならんでええって」`;
  }

  if (winStreak === 7 && !kissEventDone) {
    kissEventDone = true;
    speaker = "佳紀";
    line =
`……七回も勝つんや。

すごいな。

（佳紀が少し迷ってから、そっと近づいてくる）

……約束やから。目ぇ、閉じて。

（チュッ♡と頬へのキスをもらった）
（佳紀は恥ずかしそうに俯いている）

光&ヒカル「はァ！？　何なん今の！？？」`;
  }

  lastYoshikiHand = yoshikiHand;

  show(speaker, `あなた：${playerHand}\n佳紀：${yoshikiHand}\n\n${line}`);
  updateStatus();
}

function decideYoshikiHand() {
  if (hikaruSupportHand !== null) {
    return hikaruSupportHand;
  }

  if (lastYoshikiResult === "lose" && lastYoshikiHand !== null) {
    if (Math.random() < 0.65) {
      return lastYoshikiHand;
    }
  }

  if (lastYoshikiResult === "win" && lastYoshikiHand !== null) {
    if (Math.random() < 0.55) {
      return random(hands.filter(hand => hand !== lastYoshikiHand));
    }
  }

  if (lastYoshikiResult === "draw") {
    if (Math.random() < 0.5) {
      return "チョキ";
    }
  }

  return random(hands);
}

function predictYoshikiHand() {
  if (lastYoshikiResult === "lose" && lastYoshikiHand !== null) {
    return lastYoshikiHand;
  }

  if (lastYoshikiResult === "win" && lastYoshikiHand !== null) {
    let candidates = hands.filter(hand => hand !== lastYoshikiHand);
    return random(candidates);
  }

  if (lastYoshikiResult === "draw") {
    return "チョキ";
  }

  return random(hands);
}

function judge(player, yoshiki) {
  if (player === yoshiki) return "draw";

  if (
    (player === "グー" && yoshiki === "チョキ") ||
    (player === "チョキ" && yoshiki === "パー") ||
    (player === "パー" && yoshiki === "グー")
  ) {
    return "win";
  }

  return "lose";
}

function random(array) {
  return array[Math.floor(Math.random() * array.length)];
}

function show(speaker, text) {
  document.getElementById("speaker").textContent = speaker;
  document.getElementById("dialogue").innerHTML = text;
}

function updateStatus() {
  document.getElementById("status").innerHTML =
    `勝ち：${wins}　負け：${losses}　あいこ：${draws}<br>
     連勝：${winStreak}　連敗：${loseStreak}　遊んだ回数：${rounds}`;
}
</script>
</body>
</html>
